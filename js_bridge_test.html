<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Bridge Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 16px;
        }
        h1 {
            text-align: center;
            color: #1565C0;
            margin-bottom: 8px;
            font-size: 22px;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .card h2 {
            font-size: 15px;
            color: #333;
            margin-bottom: 12px;
            border-bottom: 2px solid #1565C0;
            padding-bottom: 6px;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border: none;
            border-radius: 8px;
            background: #1565C0;
            color: white;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
        }
        button:active { background: #0D47A1; }
        button.green  { background: #2E7D32; }
        button.orange { background: #E65100; }
        button.red    { background: #C62828; }
        button.grey   { background: #546E7A; }
        #result {
            background: #1a1a2e;
            color: #00FF88;
            border-radius: 8px;
            padding: 12px;
            font-family: monospace;
            font-size: 13px;
            min-height: 80px;
            margin-top: 8px;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h1>🧪 JS Bridge Tester</h1>
    <p class="subtitle">Tests Android.* JavaScript interface</p>

    <!-- Toast Test -->
    <div class="card">
        <h2>1. Toast Message</h2>
        <button onclick="testToast()">Show Toast</button>
    </div>

    <!-- Network Test -->
    <div class="card">
        <h2>2. Network Status</h2>
        <button class="green" onclick="testNetwork()">Check Network</button>
    </div>

    <!-- App Info Test -->
    <div class="card">
        <h2>3. App Info</h2>
        <button class="grey" onclick="testAppInfo()">Get Package Name</button>
        <button class="grey" onclick="testAppVersion()">Get App Version</button>
    </div>

    <!-- Share Test -->
    <div class="card">
        <h2>4. Share</h2>
        <button class="orange" onclick="testShare()">Open Share Sheet</button>
    </div>

    <!-- Dialer Test -->
    <div class="card">
        <h2>5. Phone Dialer</h2>
        <button class="green" onclick="testDialer()">Open Dialer</button>
    </div>

    <!-- Email Test -->
    <div class="card">
        <h2>6. Email Client</h2>
        <button class="grey" onclick="testEmail()">Open Email App</button>
    </div>

    <!-- Maps Test -->
    <div class="card">
        <h2>7. Google Maps</h2>
        <button class="green" onclick="testMaps()">Open Maps</button>
    </div>

    <!-- Browser Test -->
    <div class="card">
        <h2>8. External Browser</h2>
        <button class="orange" onclick="testBrowser()">Open in Browser</button>
    </div>

    <!-- Close App Test -->
    <div class="card">
        <h2>9. Close App</h2>
        <button class="red" onclick="testClose()">Close App</button>
    </div>

    <!-- Result Console -->
    <div class="card">
        <h2>📋 Console Output</h2>
        <div id="result">Results will appear here...</div>
    </div>

<script>
    // Helper to log results
    function log(message) {
        const result = document.getElementById('result');
        const time = new Date().toLocaleTimeString();
        result.innerHTML += '[' + time + '] ' + message + '<br>';
        result.scrollTop = result.scrollHeight;
    }

    // Check if Android bridge exists
    function checkBridge() {
        if (typeof Android === 'undefined') {
            log('❌ Android bridge NOT found! Are you running in the app?');
            return false;
        }
        return true;
    }

    // 1. Toast
    function testToast() {
        if (!checkBridge()) return;
        Android.showToast('Hello from JavaScript! 👋');
        log('✅ Toast called successfully');
    }

    // 2. Network
    function testNetwork() {
        if (!checkBridge()) return;
        var online = Android.isNetworkAvailable();
        log('✅ Network available: ' + online);
    }

    // 3. App Info
    function testAppInfo() {
        if (!checkBridge()) return;
        var pkg = Android.getPackageName();
        log('✅ Package name: ' + pkg);
    }

    function testAppVersion() {
        if (!checkBridge()) return;
        var ver = Android.getAppVersion();
        log('✅ App version: ' + ver);
    }

    // 4. Share
    function testShare() {
        if (!checkBridge()) return;
        Android.shareText('JS Bridge Test', 'Testing share from WebView!');
        log('✅ Share sheet opened');
    }

    // 5. Dialer
    function testDialer() {
        if (!checkBridge()) return;
        Android.openDialer('123456789');
        log('✅ Dialer opened');
    }

    // 6. Email
    function testEmail() {
        if (!checkBridge()) return;
        Android.openEmail('test@example.com', 'Test Subject', 'Test email body');
        log('✅ Email client opened');
    }

    // 7. Maps
    function testMaps() {
        if (!checkBridge()) return;
        Android.openMaps('Eiffel Tower Paris');
        log('✅ Maps opened');
    }

    // 8. Browser
    function testBrowser() {
        if (!checkBridge()) return;
        Android.openBrowser('https://www.google.com');
        log('✅ Browser opened');
    }

    // 9. Close
    function testClose() {
        if (!checkBridge()) return;
        log('✅ Closing app...');
        setTimeout(function() {
            Android.closeApp();
        }, 1000);
    }

    // Auto check bridge on load
    window.onload = function() {
        if (typeof Android !== 'undefined') {
            log('✅ Android bridge DETECTED! Ready to test.');
            log('📱 Package: ' + Android.getPackageName());
        } else {
            log('❌ Android bridge NOT detected!');
            log('ℹ️ Open this file inside the WebView app');
        }
    }
</script>

</body>
</html>
